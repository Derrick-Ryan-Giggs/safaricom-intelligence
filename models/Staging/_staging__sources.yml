version: 2

sources:
  - name: raw
    database: "{{ env_var('GCP_PROJECT_ID', 'safaricom-intelligence') }}"
    schema: raw
    description: >
      Raw ingestion layer. Populated two ways: a one-time seed load
      (manually curated CSVs, FY15–FY26) via safaricom_seed_dag, and an
      ongoing weekly scraper (safaricom_scraper_dag) that appends new
      FY/HY periods as Safaricom publishes them. No transformation happens
      here — one row per reporting period (or per geography, for
      kenya_ethiopia), straight from source.
    tables:
      - name: company_overview
        description: Safaricom Group headline KPIs — one row per fiscal period.
        config:
          loaded_at_field: period_end_date
          freshness:
            warn_after: {count: 200, period: day}
            error_after: {count: 400, period: day}
        columns:
          - name: period_label
            description: Safaricom's own period label, e.g. FY26, HY26
          - name: period_type
            description: FY or HY
          - name: fiscal_year
            description: Safaricom fiscal year number
          - name: period_end_date
            description: Last day of the reporting period
          - name: total_revenue_kes_bn
            description: Total revenue, Group consolidated (KES billions)
          - name: service_revenue_kes_bn
            description: Service revenue, Group consolidated (KES billions)
          - name: ebit_kes_bn
            description: Operating profit (EBIT), Group consolidated (KES billions)
          - name: net_income_kes_bn
            description: Profit for the period, Group consolidated (KES billions)
          - name: active_customers_mn
            description: One-month active customers, millions
          - name: capex_kes_bn
            description: Capital expenditure, Group consolidated (KES billions)

      - name: mpesa_metrics
        description: M-PESA segment KPIs (Safaricom Kenya) — one row per fiscal period.
        columns:
          - name: mpesa_revenue_kes_bn
            description: M-PESA total revenue, Safaricom Kenya (KES billions)
          - name: mpesa_txn_value_kes_bn
            description: Total value of M-PESA transactions (KES billions)
          - name: mpesa_txn_volume_mn
            description: Total M-PESA transaction count (millions)
          - name: mpesa_customers_1m_mn
            description: One-month active M-PESA customers (millions)
          - name: merchants_mn
            description: Total merchant count — Pochi tills + Lipa na M-PESA (millions)
          - name: business_payments_kes_bn
            description: Section 4Ab — Business Payments revenue (KES billions)
          - name: mpesa_global_kes_bn
            description: Section 4Ad — M-PESA Global revenue (KES billions)
          - name: merchant_overdraft_customers
            description: Section 4Ac — Merchant overdraft (Fuliza) customer count

      - name: revenue_segments
        description: Safaricom Kenya revenue by product segment — one row per fiscal period.
        columns:
          - name: voice_kes_bn
            description: Section 4B — Voice revenue (KES billions)
          - name: mobile_data_kes_bn
            description: Section 4B — Mobile Data revenue (KES billions)
          - name: messaging_kes_bn
            description: Section 4B — Messaging (SMS) revenue (KES billions)
          - name: mobile_incoming_kes_bn
            description: Section 4B — Mobile Incoming revenue (KES billions)
          - name: other_mobile_service_kes_bn
            description: Section 4B — Other Mobile Service revenue incl. content (KES billions)
          - name: mpesa_kes_bn
            description: M-PESA revenue — ties to mpesa_metrics.mpesa_revenue_kes_bn for the same period
          - name: fixed_service_iot_kes_bn
            description: Section 4C — Fixed Service and IoT revenue (KES billions)
          - name: connectivity_total_kes_bn
            description: Section 1a/4B — total Connectivity revenue (KES billions)
          - name: total_service_revenue_kes_bn
            description: Reported total service revenue (KES billions)

      - name: kenya_ethiopia
        description: >
          Kenya vs Ethiopia KPIs side by side. geography = KE or ET.
          One row per geography per fiscal period.
        columns:
          - name: geography
            description: KE = Safaricom Kenya, ET = Safaricom Telecommunications Ethiopia (STE)
          - name: service_revenue_kes_bn
            description: Service revenue for the geography (KES billions)
          - name: active_customers_1m_mn
            description: One-month active customers (millions)
          - name: active_customers_3m_mn
            description: Three-month active customers (millions)
          - name: ebit_kes_bn
            description: Operating profit / loss for the geography (KES billions)
          - name: capex_kes_bn
            description: Capital expenditure for the geography (KES billions)